<!DOCTYPE html>
<!-- DOCTYPE indique au navigateur que ce fichier est du HTML5 (la version moderne) -->
<html lang="fr">
<!-- La balise <html> est la racine du document. lang="fr" indique la langue pour les outils d'accessibilité -->

<head>
    <!-- <head> contient des informations sur la page, invisibles pour l'utilisateur -->
    <meta charset="UTF-8">
    <!-- charset="UTF-8" permet d'afficher les caractères spéciaux comme é, à, ç -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport permet que la page s'adapte aux écrans mobiles -->
    <title>Quiz Histoire</title>
    <!-- <title> définit le texte affiché dans l'onglet du navigateur -->
    <link rel="stylesheet" href="style.css">
    <!-- On relie notre feuille de style CSS à ce fichier HTML -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body>
    <button id="btn-mute" onclick="toggleMute()" title="Couper/activer le son">
        <i id="icone-mute" class="fa-solid fa-volume-high"></i>
    </button>

    <!-- ===== ÉCRAN D'ACCUEIL HISTOIRE ===== -->
    <div id="ecran-accueil">
        <h1>Quiz Histoire</h1>
        <p>Trouvez l'année de chaque événement.<br>
           La partie s'arrête à <strong>10 points</strong>.</p>
        <button id="btn-demarrer" onclick="demarrerPartie()">Toutes les époques</button>
        <small id="compte-total"></small>

        <div id="grille-epoques">
            <div class="cellule-epoque" id="cellule-prehistoire">
                <canvas class="icone-3d" id="canvas-prehistoire"></canvas>
                <button class="btn-prehistoire" onclick="demarrerPartie('prehistoire')">Préhistoire</button>
                <small id="compte-prehistoire"></small>
            </div>
            <div class="cellule-epoque" id="cellule-antiquite">
                <canvas class="icone-3d" id="canvas-antiquite"></canvas>
                <button class="btn-antiquite" onclick="demarrerPartie('antiquite')">Antiquité</button>
                <small id="compte-antiquite"></small>
            </div>
            <div class="cellule-epoque" id="cellule-moyen-age">
                <canvas class="icone-3d" id="canvas-moyen-age"></canvas>
                <button class="btn-moyen-age" onclick="demarrerPartie('moyen-age')">Moyen-Âge</button>
                <small id="compte-moyen-age"></small>
            </div>
            <div class="cellule-epoque" id="cellule-renaissance">
                <canvas class="icone-3d" id="canvas-renaissance"></canvas>
                <button class="btn-renaissance" onclick="demarrerPartie('renaissance')">Renaissance</button>
                <small id="compte-renaissance"></small>
            </div>
            <div class="cellule-epoque" id="cellule-classique">
                <canvas class="icone-3d" id="canvas-classique"></canvas>
                <button class="btn-classique" onclick="demarrerPartie('classique')">Époque classique</button>
                <small id="compte-classique"></small>
            </div>
            <div class="cellule-epoque" id="cellule-revolution">
                <canvas class="icone-3d" id="canvas-revolution"></canvas>
                <button class="btn-revolution" onclick="demarrerPartie('revolution')">Révolution</button>
                <small id="compte-revolution"></small>
            </div>
            <div class="cellule-epoque" id="cellule-premier-empire">
                <canvas class="icone-3d" id="canvas-premier-empire"></canvas>
                <button class="btn-premier-empire" onclick="demarrerPartie('premier-empire')">Premier Empire</button>
                <small id="compte-premier-empire"></small>
            </div>
            <div class="cellule-epoque" id="cellule-second-empire">
                <canvas class="icone-3d" id="canvas-second-empire"></canvas>
                <button class="btn-second-empire" onclick="demarrerPartie('second-empire')">Second Empire</button>
                <small id="compte-second-empire"></small>
            </div>
        </div>

        <button id="btn-mode-art" onclick="ouvrirMenuArt()">Art &amp; Culture</button>
    </div>

    <!-- ===== ÉCRAN ART & CULTURE ===== -->
    <div id="ecran-art" class="cache">
        <h1>Art &amp; Culture</h1>
        <p>Trouvez l'année de chaque œuvre ou événement artistique.<br>
           La partie s'arrête à <strong>10 points</strong>.</p>
        <button id="btn-tout-art" onclick="demarrerPartie('art')">Tout l'art</button>
        <small id="compte-art-total"></small>

        <div id="grille-art">
            <div class="cellule-art">
                <button class="btn-art-antiquite" onclick="demarrerPartie('art-antiquite')">Antiquité</button>
                <small id="compte-art-antiquite"></small>
            </div>
            <div class="cellule-art">
                <button class="btn-art-moyen-age" onclick="demarrerPartie('art-moyen-age')">Moyen-Âge</button>
                <small id="compte-art-moyen-age"></small>
            </div>
            <div class="cellule-art">
                <button class="btn-art-renaissance" onclick="demarrerPartie('art-renaissance')">Renaissance</button>
                <small id="compte-art-renaissance"></small>
            </div>
            <div class="cellule-art">
                <button class="btn-art-classique" onclick="demarrerPartie('art-classique')">Époque classique</button>
                <small id="compte-art-classique"></small>
            </div>
            <div class="cellule-art">
                <button class="btn-art-lumieres" onclick="demarrerPartie('art-lumieres')">Lumières &amp; Romantisme</button>
                <small id="compte-art-lumieres"></small>
            </div>
        </div>

        <button id="btn-retour-art" onclick="retourAccueil()">← Retour</button>
    </div>

    <!-- ===== ÉCRAN DE JEU ===== -->
    <div id="ecran-jeu" class="cache">

        <div id="hud">
            <div id="score-affichage">Score : <span id="score">0</span> / 10</div>
            <div id="vies-affichage"></div>
        </div>

        <div id="zone-question">
            <h2 id="evenement">Chargement...</h2>
            <p>En quelle année cet événement s'est-il produit ?</p>
        </div>

        <form onsubmit="verifierReponse(); return false;">
            <button type="button" id="btn-signe" onclick="basculerSigne()">±</button>
            <input
                type="text"
                inputmode="numeric"
                id="champ-annee"
                placeholder="Année"
            >
            <button type="submit" id="btn-valider">Valider</button>
        </form>

        <button id ="btn-suivant" onclick="nextQuestion()">Question suivante</button>

        <div id="zone-feedback"></div>

        <button id="btn-terminer" onclick="terminerPartie()">Terminer la partie</button>

    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

</body>
</html>
